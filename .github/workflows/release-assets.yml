name: Release assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  windows-installer:
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: windows-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build binaries
        run: cargo build -p codex-plus-launcher -p codex-plus-manager-native --release

      - name: Stage Windows app files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows/app | Out-Null
          Copy-Item target/release/codex-plus-plus.exe dist/windows/app/
          Copy-Item target/release/codex-plus-plus-manager-native.exe dist/windows/app/codex-plus-plus-manager.exe
          python scripts/installer/generate-package-manifest.py `
            --root dist/windows/app `
            --output dist/windows/native-package-manifest.json `
            --platform windows-x64 `
            --source-binary target/release/codex-plus-plus-manager-native.exe `
            --staged-binary codex-plus-plus-manager.exe `
            --forbid codex-plus-plus-manager-native

      - name: Build Windows zip asset
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}".TrimStart("v", "V")
          New-Item -ItemType Directory -Force dist/windows | Out-Null
          Compress-Archive -Path dist/windows/app/* -DestinationPath "dist/windows/CodexPlusPlus-$version-windows-x64.zip" -Force

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}".TrimStart("v", "V")
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            $makensis = "makensis"
          }
          Push-Location scripts/installer/windows
          & $makensis "/INPUTCHARSET" "UTF8" "/DVERSION=$version" CodexPlusPlus.nsi
          Pop-Location

      - name: Upload Windows installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/windows/*.exe
            dist/windows/*.zip
            dist/windows/native-package-manifest.json

  macos-dmg:
    if: github.event_name == 'release' && github.event.action == 'published'
    name: macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binaries
        run: cargo build -p codex-plus-launcher -p codex-plus-manager-native --release --target ${{ matrix.target }}

      - name: Build macOS DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION#V}"
          BINARY_DIR="$PWD/target/${{ matrix.target }}/release" bash scripts/installer/macos/package-dmg.sh "$VERSION" "${{ matrix.arch }}"
          python scripts/installer/generate-package-manifest.py \
            --root dist/macos/stage \
            --output "dist/macos/native-package-manifest-${{ matrix.arch }}.json" \
            --platform "macos-${{ matrix.arch }}" \
            --source-binary "target/${{ matrix.target }}/release/codex-plus-plus-manager-native" \
            --staged-binary "Codex++ 管理工具.app/Contents/MacOS/CodexPlusPlusManager" \
            --forbid codex-plus-plus-manager-native \
            --allow-packaging-transform

      - name: Build macOS zip asset
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION#V}"
          mkdir -p dist/macos/app-${{ matrix.arch }}
          cp -R "dist/macos/stage/Codex++.app" "dist/macos/app-${{ matrix.arch }}/"
          cp -R "dist/macos/stage/Codex++ 管理工具.app" "dist/macos/app-${{ matrix.arch }}/"
          python scripts/installer/generate-package-manifest.py \
            --root "dist/macos/app-${{ matrix.arch }}" \
            --output "dist/macos/native-package-zip-manifest-${{ matrix.arch }}.json" \
            --platform "macos-${{ matrix.arch }}" \
            --source-binary "target/${{ matrix.target }}/release/codex-plus-plus-manager-native" \
            --staged-binary "Codex++ 管理工具.app/Contents/MacOS/CodexPlusPlusManager" \
            --forbid codex-plus-plus-manager-native \
            --allow-packaging-transform
          (cd dist/macos && zip -r "CodexPlusPlus-${VERSION}-macos-${{ matrix.arch }}.zip" "app-${{ matrix.arch }}")

      - name: Verify macOS bundle structure
        run: |
          set -euo pipefail
          test -L "dist/macos/stage/Applications"
          test "$(readlink "dist/macos/stage/Applications")" = "/Applications"
          for app in "dist/macos/stage/Codex++.app" "dist/macos/stage/Codex++ 管理工具.app"; do
            test -f "$app/Contents/Info.plist"
            test -f "$app/Contents/PkgInfo"
            test -x "$app/Contents/MacOS/$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app/Contents/Info.plist")"
            plutil -lint "$app/Contents/Info.plist" >/dev/null
            codesign -dv "$app" >/dev/null 2>&1
            echo "verified: $app"
          done

      - name: Upload macOS DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/macos/*.dmg
            dist/macos/*.zip
            dist/macos/native-package-manifest-${{ matrix.arch }}.json
            dist/macos/native-package-zip-manifest-${{ matrix.arch }}.json

  latest-json:
    if: github.event_name == 'release' && github.event.action == 'published'
    name: Upload static latest.json
    runs-on: ubuntu-latest
    needs:
      - windows-installer
      - macos-dmg
    steps:
      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "$REPO" --json assets,body,tagName,url > release.json
          python <<'PY'
          import json
          import os
          from urllib.parse import quote

          with open("release.json", encoding="utf-8") as stream:
              release = json.load(stream)
          repo = os.environ["REPO"]
          tag = release.get("tagName") or os.environ["TAG"]
          version = tag[1:] if tag[:1].lower() == "v" else tag
          base_url = f"https://github.com/{repo}/releases/download/{tag}"
          assets = [
              {"name": asset["name"], "url": f"{base_url}/{quote(asset['name'], safe='')}"}
              for asset in release.get("assets", [])
              if asset.get("name") != "latest.json"
          ]
          payload = {
              "version": f"v{version}",
              "url": release.get("url") or f"https://github.com/{repo}/releases/tag/{tag}",
              "body": release.get("body") or "",
              "assets": assets,
          }
          with open("latest.json", "w", encoding="utf-8", newline="\n") as stream:
              json.dump(payload, stream, ensure_ascii=False, indent=2)
              stream.write("\n")
          PY
          cat latest.json

      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: gh release upload "$TAG" latest.json --clobber --repo "$REPO"
