name: PR build artifacts

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-artifacts:
    name: Windows artifacts
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Mark disposable package profile
        shell: pwsh
        run: |
          if ($env:GITHUB_ACTIONS -ne "true") {
            throw "package lifecycle profile ownership requires GitHub Actions"
          }
          $windowsProfile = [Environment]::GetFolderPath([Environment+SpecialFolder]::UserProfile)
          if ([string]::IsNullOrWhiteSpace($windowsProfile)) {
            throw "Windows Known Folder profile is unavailable"
          }
          @($HOME, $windowsProfile) | Select-Object -Unique | ForEach-Object {
            $state = Join-Path $_ ".codex-session-delete"
            New-Item -ItemType Directory -Force $state | Out-Null
            Set-Content -LiteralPath (Join-Path $state ".codex-plus-package-disposable-profile") -Value "schema=1" -Encoding ascii
          }
          "CODEX_PLUS_PACKAGE_WINDOWS_PROFILE=$windowsProfile" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install NSIS
        run: choco install nsis -y

      - name: Rust formatting
        run: cargo fmt --all -- --check

      - name: Rust clippy for manager crates
        run: cargo clippy -p codex-plus-manager-service -p codex-plus-manager --all-targets --no-deps -- -D warnings

      - name: Rust tests
        run: cargo test --workspace

      - name: Build release binaries
        run: cargo build -p codex-plus-launcher -p codex-plus-manager --release

      - name: Stage Windows app files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows/app | Out-Null
          Copy-Item target/release/codex-plus-plus.exe dist/windows/app/
          Copy-Item target/release/codex-plus-plus-manager.exe dist/windows/app/
          # The pre-cutover filename is allowed only as a negative package assertion.
          python scripts/installer/generate-package-manifest.py `
            --root dist/windows/app `
            --output dist/windows/native-package-manifest.json `
            --platform windows-x64 `
            --source-binary target/release/codex-plus-plus-manager.exe `
            --staged-binary codex-plus-plus-manager.exe `
            --forbid codex-plus-plus-manager-native

      - name: Run pinned package lifecycle fixture
        shell: pwsh
        env:
          CODEX_PLUS_PACKAGE_DISPOSABLE_PROFILE: "1"
          PREVIOUS_VERSION: 1.2.36-custom.1
          PREVIOUS_SHA256: 40e7603223a0e8fef43d546f94ad594a3f3a97717ef01d31401edb5ce86e62ef
        run: |
          $fixtureParent = Join-Path $PWD "target/package-fixtures/ci"
          New-Item -ItemType Directory -Force $fixtureParent | Out-Null
          $previous = Join-Path $fixtureParent "CodexPlusPlus-$env:PREVIOUS_VERSION-windows-x64.zip"
          $asset = "https://github.com/${{ github.repository }}/releases/download/v$env:PREVIOUS_VERSION/CodexPlusPlus-$env:PREVIOUS_VERSION-windows-x64.zip"
          Invoke-WebRequest -Uri $asset -OutFile $previous
          python scripts/installer/run-package-lifecycle-fixture.py `
            --fixture-root (Join-Path $fixtureParent "lifecycle") `
            --previous-package $previous `
            --previous-version $env:PREVIOUS_VERSION `
            --previous-sha256 $env:PREVIOUS_SHA256 `
            --native-package-root dist/windows/app `
            --native-manifest dist/windows/native-package-manifest.json `
            --platform windows-x64 `
            --probe scripts/installer/probe-packaged-manager.py `
            --output (Join-Path $fixtureParent "lifecycle-result.json")

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v", "V")
          $version = $version -replace '[\\/]', '-'
          if (-not $version -or $version -eq "main") {
            $version = "0.0.0-${{ github.run_number }}"
          }
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            $makensis = "makensis"
          }
          Push-Location scripts/installer/windows
          & $makensis "/INPUTCHARSET" "UTF8" "/DVERSION=$version" CodexPlusPlus.nsi
          Pop-Location

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: codex-plus-plus-windows-binaries
          path: |
            dist/windows/app/*
            dist/windows/native-package-manifest.json
          if-no-files-found: error

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: codex-plus-plus-windows-installer
          path: dist/windows/*.exe
          if-no-files-found: error

  macos-dmg:
    name: macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build -p codex-plus-launcher -p codex-plus-manager --release --target ${{ matrix.target }}

      - name: Build macOS DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION#V}"
          VERSION="${VERSION//\//-}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "main" ]; then
            VERSION="0.0.0-${GITHUB_RUN_NUMBER}"
          fi
          BINARY_DIR="$PWD/target/${{ matrix.target }}/release" bash scripts/installer/macos/package-dmg.sh "$VERSION" "${{ matrix.arch }}"
          # The pre-cutover filename is allowed only as a negative package assertion.
          python scripts/installer/generate-package-manifest.py \
            --root dist/macos/stage \
            --output "dist/macos/native-package-manifest-${{ matrix.arch }}.json" \
            --platform "macos-${{ matrix.arch }}" \
            --source-binary "target/${{ matrix.target }}/release/codex-plus-plus-manager" \
            --staged-binary "Codex++ 管理工具.app/Contents/MacOS/CodexPlusPlusManager" \
            --forbid codex-plus-plus-manager-native \
            --allow-packaging-transform

      - name: Verify macOS bundle structure
        run: |
          set -euo pipefail
          test -L "dist/macos/stage/Applications"
          test "$(readlink "dist/macos/stage/Applications")" = "/Applications"
          for app in "dist/macos/stage/Codex++.app" "dist/macos/stage/Codex++ 管理工具.app"; do
            test -f "$app/Contents/Info.plist"
            test -f "$app/Contents/PkgInfo"
            test -x "$app/Contents/MacOS/$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app/Contents/Info.plist")"
            plutil -lint "$app/Contents/Info.plist" >/dev/null
            codesign -dv "$app" >/dev/null 2>&1
            echo "verified: $app"
          done

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: codex-plus-plus-macos-${{ matrix.arch }}-dmg
          path: |
            dist/macos/*.dmg
            dist/macos/native-package-manifest-${{ matrix.arch }}.json
          if-no-files-found: error
